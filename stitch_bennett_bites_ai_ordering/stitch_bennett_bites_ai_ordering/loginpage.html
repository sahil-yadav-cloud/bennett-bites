</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-[10px] font-bold text-secondary uppercase tracking-wider hover:opacity-70 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>

</div>
</div>
<button class="mt-2 w-full h-14 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.97] transition-all duration-200 relative overflow-hidden group" type="submit">
<!-- Shimmer Easter Egg -->
<div class="absolute inset-0 w-1/2 h-full bg-white/20 -skew-x-[20deg] translate-x-[-100%] animate-shimmer pointer-events-none group-hover:bg-white/30"></div>
<span class="relative z-10">Login</span>
<span class="material-symbols-outlined text-[20px] relative z-10">arrow_forward</span>
</button>

<span class="absolute bg-surface-container-lowest px-4 text-[10px] font-bold uppercase tracking-widest text-outline">or</span>
